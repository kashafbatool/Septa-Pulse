services:
  # ── PostgreSQL + PostGIS ──────────────────────────────────────
  db:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    environment:
      POSTGRES_DB: septapulse
      POSTGRES_USER: septa
      POSTGRES_PASSWORD: septa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U septa -d septapulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Database migrations (runs once then exits) ────────────────
  migrate:
    build: .
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        alembic upgrade head &&
        echo 'Migrations complete.'
      "
    env_file: .env
    environment:
      DATABASE_URL: postgresql://septa:septa@db:5432/septapulse
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ── FastAPI backend ───────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql://septa:septa@db:5432/septapulse
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - .:/app  # hot-reload for local dev

  # ── Data pipeline (APScheduler, polls SEPTA every 30s) ───────
  pipeline:
    build: .
    restart: unless-stopped
    command: python -m src.scheduler.lambda_handler
    env_file: .env
    environment:
      DATABASE_URL: postgresql://septa:septa@db:5432/septapulse
      POLL_INTERVAL_SECONDS: "30"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
