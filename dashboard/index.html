<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEPTA Pulse — Real-Time Transit Analytics</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet.heat -->
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <span class="header-logo">&#9654;</span>
      <span class="header-title">SEPTA <span class="accent">Pulse</span></span>
    </div>
    <div class="header-stats" id="header-stats">
      <div class="stat-chip">
        <span class="stat-label">Live Vehicles</span>
        <span class="stat-value" id="stat-live">—</span>
      </div>
      <div class="stat-chip delayed">
        <span class="stat-label">Delayed</span>
        <span class="stat-value" id="stat-delayed">—</span>
      </div>
      <div class="stat-chip">
        <span class="stat-label">Positions (24h)</span>
        <span class="stat-value" id="stat-24h">—</span>
      </div>
      <div class="stat-chip">
        <span class="stat-label">Last Update</span>
        <span class="stat-value" id="stat-update">—</span>
      </div>
    </div>
  </header>

  <!-- Main layout -->
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3 class="section-title">Filters</h3>
        <div class="filter-group">
          <label class="filter-label">Mode</label>
          <div class="btn-group" id="mode-filter">
            <button class="btn-mode active" data-mode="">All</button>
            <button class="btn-mode" data-mode="bus">Bus</button>
            <button class="btn-mode" data-mode="trolley">Trolley</button>
            <button class="btn-mode" data-mode="rail">Rail</button>
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">Map Layer</label>
          <div class="btn-group" id="layer-toggle">
            <button class="btn-mode active" data-layer="live">Live</button>
            <button class="btn-mode" data-layer="heatmap">Heatmap</button>
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">Route</label>
          <select id="route-select" class="select-input">
            <option value="">All routes</option>
          </select>
        </div>
      </div>

      <div class="sidebar-section">
        <h3 class="section-title">Delay Rankings <span class="section-sub">(last 24h)</span></h3>
        <div class="chart-container">
          <canvas id="delay-chart"></canvas>
        </div>
      </div>

      <div class="sidebar-section">
        <h3 class="section-title">On-Time Performance</h3>
        <div class="chart-container donut-container">
          <canvas id="ontime-chart"></canvas>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="refresh-status">
          <span class="pulse-dot" id="pulse-dot"></span>
          <span id="refresh-label">Refreshing every 30s</span>
        </div>
      </div>
    </aside>

    <!-- Map -->
    <main class="map-wrapper">
      <div id="map"></div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/map.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
