name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: septapulse_test
          POSTGRES_USER: septa
          POSTGRES_PASSWORD: septa
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://septa:septa@localhost:5432/septapulse_test
      SEPTA_API_BASE: https://www3.septa.org/api
      POLL_INTERVAL_SECONDS: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check formatting (black)
        run: black --check src/ tests/

      - name: Lint (flake8)
        run: flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v --tb=short
